<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LotoMetrics — Análise estatística de loterias by 3brasil Tech">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- SEO -->
  <meta property="og:title" content="LotoMetrics — 3brasil Tech">
  <meta property="og:description" content="Análise estatística profissional de loterias">
  <meta property="og:type" content="website">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LotoMetrics">
  <meta name="theme-color" content="#0A1628">

  <title>LotoMetrics — 3brasil Tech</title>
  <link rel="manifest" href="manifest.json">

  <!-- Splash screen -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A1628;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn .5s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    .logo-box {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1B3A6E, #2B8ED4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(43,142,212,0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(43,142,212,0.3); }
      50%       { box-shadow: 0 0 60px rgba(43,142,212,0.5); }
    }

    .brand {
      text-align: center;
      color: #F0F4FF;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .brand span {
      color: #F5921E;
      font-size: 10px;
      letter-spacing: 3px;
      display: block;
      margin-top: 2px;
      font-weight: 700;
    }

    .loader {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #1B3A6E, #2B8ED4, #F5921E);
      border-radius: 2px;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo-box">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <path d="M8 12 Q8 6 16 6 L30 6 Q38 6 38 14 Q38 20 30 20 L18 20"
              stroke="#F5921E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
        <path d="M8 32 Q8 38 16 38 L30 38 Q38 38 38 30 Q38 24 30 24 L18 24"
              stroke="#60B8F0" stroke-width="4.5" stroke-linecap="round" fill="none"/>
        <circle cx="8" cy="22" r="3" fill="#F5921E"/>
      </svg>
    </div>
    <div class="brand">
      3brasil Tech
      <span>LOTOMETRICS</span>
    </div>
    <div class="loader"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.transition = 'opacity 0.4s ease';
        setTimeout(() => splash.remove(), 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
