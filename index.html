<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LotoMetrics SaaS V3</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --bg-soft: #0f1b33;
      --card: rgba(11, 22, 42, 0.92);
      --line: rgba(122, 162, 247, 0.18);
      --text: #e8eefc;
      --muted: #95a6d1;
      --primary: #6ea8ff;
      --accent: #f59e0b;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(110,168,255,.18), transparent 30%),
        linear-gradient(180deg, #020817 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1220px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    h1, h2, h3, h4, p { margin-top: 0; }
    h1 { font-size: 2.5rem; margin-bottom: 8px; }
    .muted { color: var(--muted); }
    .badge {
      display: inline-block;
      background: rgba(34,197,94,.18);
      color: #bbf7d0;
      border: 1px solid rgba(34,197,94,.35);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: .92rem;
      font-weight: 700;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 36px rgba(0,0,0,.24);
    }

    .full { grid-column: 1 / -1; }
    .stack { display: grid; gap: 10px; }
    .inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .split { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; }
    .list { display: grid; gap: 12px; }

    input, select, button, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.2);
      background: rgba(15, 23, 42, .95);
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
    }

    button {
      width: auto;
      background: linear-gradient(135deg, var(--primary), #4f8cff);
      border: 0;
      color: #081120;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
    }

    button.warn {
      background: linear-gradient(135deg, #f59e0b, #f97316);
    }

    .message {
      background: rgba(34,197,94,.13);
      border: 1px solid rgba(34,197,94,.28);
      color: #dcfce7;
      padding: 12px;
      border-radius: 14px;
    }

    .message.error {
      background: rgba(239,68,68,.13);
      border-color: rgba(239,68,68,.25);
      color: #fecaca;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .ball {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #2563eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
    }

    .panel-item {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.03);
    }

    .price {
      font-size: 1.4rem;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .small { font-size: .92rem; }

    @media (max-width: 900px) {
      .grid, .split { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <h1>LotoMetrics SaaS V3</h1>
        <p class="muted">Versao de teste em modo demo para o GitHub Pages.</p>
        <div class="badge">Sistema pronto para teste no navegador</div>
        <p class="muted small" id="sessionText"></p>
      </div>
      <div class="inline">
        <button class="secondary" id="seedUserBtn">Entrar com demo</button>
        <button class="secondary" id="seedAdminBtn">Entrar como admin</button>
        <button class="warn" id="logoutBtn" style="display:none;">Sair</button>
      </div>
    </header>

    <div id="authArea" class="grid">
      <section class="card">
        <h2>Entrar</h2>
        <div class="stack">
          <input id="loginEmail" type="email" placeholder="Seu e-mail">
          <input id="loginPassword" type="password" placeholder="Sua senha">
          <button id="loginBtn">Entrar</button>
        </div>
      </section>

      <section class="card">
        <h2>Criar conta</h2>
        <div class="stack">
          <input id="registerName" placeholder="Seu nome">
          <input id="registerEmail" type="email" placeholder="Seu e-mail">
          <input id="registerPassword" type="password" placeholder="Sua senha">
          <button id="registerBtn">Cadastrar</button>
        </div>
      </section>
    </div>

    <div id="dashboard" style="display:none;">
      <div id="messageBox"></div>
      <div class="grid">
        <section class="card">
          <h2>Gerador</h2>
          <div class="stack">
            <label>Loteria</label>
            <select id="lotteryType">
              <option value="lotofacil">Lotofacil</option>
              <option value="quina">Quina</option>
              <option value="megasena">Mega-Sena</option>
            </select>
            <label>Quantidade de jogos</label>
            <input id="gameCount" type="number" min="1" max="20" value="3">
            <label>Dezenas por jogo</label>
            <input id="pickCount" type="number" min="5" max="25" value="15">
            <button id="generateBtn">Gerar e salvar</button>
          </div>
        </section>

        <section class="card">
          <h2>Ultimo resultado</h2>
          <div id="latestResult"></div>
        </section>

        <section class="card full">
          <h2>Historico de jogos</h2>
          <div class="list" id="historyList"></div>
        </section>

        <section class="card full">
          <h2>Planos</h2>
          <div class="grid" id="plansList"></div>
        </section>

        <section class="card">
          <h2>Bolao</h2>
          <div class="stack">
            <input id="poolName" value="Bolao Principal">
            <select id="poolLottery">
              <option value="lotofacil">Lotofacil</option>
              <option value="quina">Quina</option>
              <option value="megasena">Mega-Sena</option>
            </select>
            <button id="createPoolBtn">Criar bolao</button>
          </div>
        </section>

        <section class="card">
          <h2>Resultados em cache</h2>
          <div class="inline">
            <button id="syncBtn" class="secondary">Sincronizar</button>
          </div>
          <div class="list" id="cacheList" style="margin-top:12px;"></div>
        </section>

        <section class="card full" id="adminPanel" style="display:none;">
          <h2>Painel Admin</h2>
          <div class="split">
            <div class="panel-item"><strong>Usuarios</strong><div id="metricUsers" class="price">0</div></div>
            <div class="panel-item"><strong>Assinaturas ativas</strong><div id="metricSubs" class="price">0</div></div>
            <div class="panel-item"><strong>Jogos</strong><div id="metricGames" class="price">0</div></div>
            <div class="panel-item"><strong>Boloes</strong><div id="metricPools" class="price">0</div></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const KEYS = {
      users: 'lotometrics.demo.users',
      games: 'lotometrics.demo.games',
      subs: 'lotometrics.demo.subscriptions',
      pools: 'lotometrics.demo.pools',
      cache: 'lotometrics.demo.resultsCache',
      token: 'token'
    }

    const plans = [
      { slug: 'starter', name: 'Starter', price: 29, features: ['10 jogos por geracao', 'Ate 50 jogos por dia', '1 bolao'] },
      { slug: 'pro', name: 'Pro', price: 79, features: ['25 jogos por geracao', 'Ate 300 jogos por dia', '5 boloes'] },
      { slug: 'premium', name: 'Premium', price: 149, features: ['100 jogos por geracao', 'Uso intenso', 'Boloes ilimitados'] }
    ]

    const results = {
      lotofacil: { lottery_type: 'lotofacil', contest: 3668, draw_date: '2026-04-22', numbers: [1,2,5,6,7,9,10,11,12,14,18,20,21,24,25], estimated_prize: 'R$ 1.800.000,00', source: 'demo-local' },
      quina: { lottery_type: 'quina', contest: 6712, draw_date: '2026-04-22', numbers: [3,11,26,37,78], estimated_prize: 'R$ 600.000,00', source: 'demo-local' },
      megasena: { lottery_type: 'megasena', contest: 2998, draw_date: '2026-04-18', numbers: [4,15,17,20,24,54], estimated_prize: 'R$ 70.000.000,00', source: 'demo-local' }
    }

    function read(key, fallback) {
      try {
        const raw = localStorage.getItem(key)
        return raw ? JSON.parse(raw) : fallback
      } catch {
        return fallback
      }
    }

    function write(key, value) {
      localStorage.setItem(key, JSON.stringify(value))
    }

    function ensureData() {
      if (!read(KEYS.users, null)) {
        write(KEYS.users, [
          { id: 1, name: 'Demo User', email: 'demo@lotometrics.app', password: '123456', plan: 'starter', is_admin: false },
          { id: 2, name: 'Admin Demo', email: 'owner@admin.local', password: '123456', plan: 'premium', is_admin: true }
        ])
      }
      if (!read(KEYS.games, null)) write(KEYS.games, [])
      if (!read(KEYS.subs, null)) write(KEYS.subs, [])
      if (!read(KEYS.pools, null)) write(KEYS.pools, [])
      if (!read(KEYS.cache, null)) write(KEYS.cache, [])
    }

    function nextId(items) {
      return items.length ? Math.max(...items.map(item => item.id)) + 1 : 1
    }

    function setMessage(text, isError) {
      const box = document.getElementById('messageBox')
      box.innerHTML = text ? `<div class="message ${isError ? 'error' : ''}">${text}</div>` : ''
    }

    function tokenFor(email) {
      return `demo-token:${email}`
    }

    function getCurrentUser() {
      ensureData()
      const token = localStorage.getItem(KEYS.token) || ''
      const email = token.startsWith('demo-token:') ? token.slice('demo-token:'.length) : null
      if (!email) return null
      return read(KEYS.users, []).find(user => user.email === email) || null
    }

    function renderBalls(numbers) {
      return `<div class="balls">${numbers.map(n => `<span class="ball">${String(n).padStart(2, '0')}</span>`).join('')}</div>`
    }

    function sampleNumbers(total, picks) {
      const bag = Array.from({ length: total }, (_, i) => i + 1)
      const chosen = []
      while (chosen.length < picks && bag.length) {
        const idx = Math.floor(Math.random() * bag.length)
        chosen.push(bag.splice(idx, 1)[0])
      }
      return chosen.sort((a, b) => a - b)
    }

    function saveUserSession(user) {
      localStorage.setItem(KEYS.token, tokenFor(user.email))
      refresh()
    }

    function logout() {
      localStorage.removeItem(KEYS.token)
      refresh()
    }

    function register() {
      ensureData()
      const name = document.getElementById('registerName').value.trim()
      const email = document.getElementById('registerEmail').value.trim()
      const password = document.getElementById('registerPassword').value
      const users = read(KEYS.users, [])
      if (!name || !email || !password) return setMessage('Preencha todos os campos do cadastro.', true)
      if (users.some(user => user.email === email)) return setMessage('E-mail ja cadastrado.', true)
      const user = { id: nextId(users), name, email, password, plan: 'starter', is_admin: email.endsWith('@admin.local') }
      write(KEYS.users, [...users, user])
      setMessage('Cadastro realizado. Agora faca login.')
    }

    function login(email, password) {
      ensureData()
      const users = read(KEYS.users, [])
      const user = users.find(item => item.email === email && item.password === password)
      if (!user) return setMessage('Credenciais invalidas.', true)
      saveUserSession(user)
      setMessage('Login realizado com sucesso.')
    }

    function activatePlan(planSlug) {
      const user = getCurrentUser()
      const users = read(KEYS.users, [])
      const subs = read(KEYS.subs, [])
      write(KEYS.users, users.map(item => item.id === user.id ? { ...item, plan: planSlug } : item))
      write(KEYS.subs, [{ id: nextId(subs), user_id: user.id, plan: planSlug, provider: 'internal-demo', status: 'active' }, ...subs])
      setMessage(`Plano ${planSlug} ativado.`)
      refresh()
    }

    function createGame() {
      const user = getCurrentUser()
      const lotteryType = document.getElementById('lotteryType').value
      const gameCount = Number(document.getElementById('gameCount').value || 1)
      const pickCount = Number(document.getElementById('pickCount').value || 6)
      const totalMap = { lotofacil: 25, quina: 80, megasena: 60 }
      const games = read(KEYS.games, [])
      const created = []
      for (let i = 0; i < gameCount; i += 1) {
        const numbers = sampleNumbers(totalMap[lotteryType], pickCount)
        created.push({
          id: Date.now() + i,
          user_id: user.id,
          lottery_type: lotteryType,
          numbers,
          score: Math.floor(20 + Math.random() * 10),
          game_sum: numbers.reduce((sum, n) => sum + n, 0),
          even_count: numbers.filter(n => n % 2 === 0).length,
          source: 'demo'
        })
      }
      write(KEYS.games, [...games, ...created])
      setMessage(`${created.length} jogo(s) gerado(s) com sucesso.`)
      refresh()
    }

    function createPool() {
      const user = getCurrentUser()
      const pools = read(KEYS.pools, [])
      const created = {
        id: nextId(pools),
        owner_id: user.id,
        name: document.getElementById('poolName').value || 'Bolao Principal',
        lottery_type: document.getElementById('poolLottery').value,
        members: [{ id: 1, email: user.email, role: 'owner' }],
        games: []
      }
      write(KEYS.pools, [created, ...pools])
      setMessage('Bolao criado com sucesso.')
      refresh()
    }

    function syncCache() {
      const user = getCurrentUser()
      if (!user.is_admin) return setMessage('Somente admin pode sincronizar o cache.', true)
      const type = document.getElementById('lotteryType').value
      const cache = read(KEYS.cache, [])
      const item = results[type]
      write(KEYS.cache, [item, ...cache.filter(entry => !(entry.lottery_type === item.lottery_type && entry.contest === item.contest))])
      setMessage('Cache sincronizado.')
      refresh()
    }

    function refresh() {
      ensureData()
      const user = getCurrentUser()
      const authArea = document.getElementById('authArea')
      const dashboard = document.getElementById('dashboard')
      const logoutBtn = document.getElementById('logoutBtn')
      const sessionText = document.getElementById('sessionText')

      if (!user) {
        authArea.style.display = ''
        dashboard.style.display = 'none'
        logoutBtn.style.display = 'none'
        sessionText.textContent = 'Use as contas demo ou crie uma conta nova para testar.'
        return
      }

      authArea.style.display = 'none'
      dashboard.style.display = ''
      logoutBtn.style.display = ''
      sessionText.textContent = `Logado como ${user.name} · plano ${user.plan}${user.is_admin ? ' · admin' : ''}`

      const lotteryType = document.getElementById('lotteryType').value
      const latest = results[lotteryType]
      document.getElementById('latestResult').innerHTML = `
        <strong>${latest.lottery_type} · concurso ${latest.contest}</strong>
        ${renderBalls(latest.numbers)}
        <p class="muted small">Data: ${latest.draw_date}</p>
        <p class="muted small">Estimativa: ${latest.estimated_prize}</p>
      `

      const history = read(KEYS.games, []).filter(item => item.user_id === user.id).sort((a, b) => b.id - a.id)
      document.getElementById('historyList').innerHTML = history.length
        ? history.map(item => `
          <div class="panel-item">
            <strong>#${item.id} · ${item.lottery_type}</strong>
            ${renderBalls(item.numbers)}
            <div class="muted small">Score ${item.score} · soma ${item.game_sum} · pares ${item.even_count}</div>
          </div>`).join('')
        : '<div class="panel-item">Nenhum jogo gerado ainda.</div>'

      document.getElementById('plansList').innerHTML = plans.map(plan => `
        <div class="card">
          <h3>${plan.name}</h3>
          <div class="price">R$ ${plan.price.toFixed(2)}/mes</div>
          <div class="list small">${plan.features.map(feature => `<div>${feature}</div>`).join('')}</div>
          <div style="margin-top:12px;"><button onclick="activatePlan('${plan.slug}')">Ativar demo</button></div>
        </div>`).join('')

      const cache = read(KEYS.cache, []).filter(item => item.lottery_type === lotteryType)
      document.getElementById('cacheList').innerHTML = cache.length
        ? cache.map(item => `<div class="panel-item"><strong>Concurso ${item.contest}</strong>${renderBalls(item.numbers)}<div class="muted small">${item.draw_date} · ${item.source}</div></div>`).join('')
        : '<div class="panel-item">Cache ainda vazio.</div>'

      const users = read(KEYS.users, [])
      const subs = read(KEYS.subs, [])
      const pools = read(KEYS.pools, [])
      const adminPanel = document.getElementById('adminPanel')
      if (user.is_admin) {
        adminPanel.style.display = ''
        document.getElementById('metricUsers').textContent = users.length
        document.getElementById('metricSubs').textContent = subs.filter(item => item.status === 'active').length
        document.getElementById('metricGames').textContent = read(KEYS.games, []).length
        document.getElementById('metricPools').textContent = pools.length
      } else {
        adminPanel.style.display = 'none'
      }
    }

    document.getElementById('registerBtn').addEventListener('click', register)
    document.getElementById('loginBtn').addEventListener('click', () => login(
      document.getElementById('loginEmail').value.trim(),
      document.getElementById('loginPassword').value
    ))
    document.getElementById('generateBtn').addEventListener('click', createGame)
    document.getElementById('createPoolBtn').addEventListener('click', createPool)
    document.getElementById('syncBtn').addEventListener('click', syncCache)
    document.getElementById('logoutBtn').addEventListener('click', logout)
    document.getElementById('seedUserBtn').addEventListener('click', () => login('demo@lotometrics.app', '123456'))
    document.getElementById('seedAdminBtn').addEventListener('click', () => login('owner@admin.local', '123456'))
    document.getElementById('lotteryType').addEventListener('change', refresh)

    ensureData()
    refresh()
  </script>
</body>
</html>
