apiVersion: apps/v1
kind: Deployment
metadata:
  name: lotometrics-api
  namespace: lotometrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lotometrics-api
  template:
    metadata:
      labels:
        app: lotometrics-api
    spec:
      containers:
        - name: api
          image: lotometrics-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: lotometrics-config
            - secretRef:
                name: lotometrics-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lotometrics-api
  namespace: lotometrics
spec:
  selector:
    app: lotometrics-api
  ports:
    - port: 8000
      targetPort: 8000
